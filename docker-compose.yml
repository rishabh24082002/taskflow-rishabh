version: '3.8'

services:
  db:
    image: postgres:15
    container_name: taskflow_db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: taskflow_backend
    restart: always
    depends_on:
      - db
    env_file:
      - .env
    ports:
      - "5000:5000"
    command: >
      sh -c "
      npx knex migrate:latest &&
      npx knex seed:run &&
      npm start
      "

volumes:
  pg_data: